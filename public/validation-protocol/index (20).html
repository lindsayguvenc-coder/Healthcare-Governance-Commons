// ── SECTION RENDERING ─────────────────────────────────────────────────────

function renderSection(idx) {
  document.getElementById('status-phase').textContent = `Section ${idx + 1} of 6`;
  renderSidebar();
  const content = document.getElementById('content');
  const section = getSection(idx);
  if (!section) return;

  const visibleQs = section.questions.filter(q => {
    if (q.id.startsWith('_')) return true;
    if (q.showIf && !q.showIf()) return false;
    return true;
  });

  let html = `<div class="elicit-phase">
    <div class="section-header">
      <div class="section-num">Section ${section.num} of ${section.total}${state.answers.q0b === 'summary' ? ' · Workflow Summary Track' : ''}</div>
      <div class="section-title">${section.title}</div>
      <div class="section-desc">${section.desc}</div>
    </div>`;

  visibleQs.forEach((q, qi) => { html += renderQuestion(q, qi); });

  const isLast = idx === 5;
  html += `
    <div class="section-nav">
      <button class="nav-btn" onclick="goBack(${idx})">← Back</button>
      <span class="progress-text">Section ${idx + 1} of 6</span>
      <button class="nav-btn-primary ${isLast ? 'green' : ''}" onclick="${isLast ? 'goToReady()' : `goSection(${idx + 1})`}">
        ${isLast ? 'Review & generate →' : 'Next section →'}
      </button>
    </div>
  </div>`;

  content.innerHTML = html;
  content.scrollTop = 0;
  visibleQs.forEach(q => restoreAnswer(q));
  reEvaluateLogicFlags(section);
}

function renderQuestion(q, idx) {
  if (q.type === 'note') {
    return `<div class="methodology-note">${q.text}</div>`;
  }

  let input = '';
  const val = state.answers[q.id];

  if (q.type === 'select') {
    input = `<select class="q-select" id="q-${q.id}" onchange="setAnswer('${q.id}', this.value); checkLogicFlag('${q.id}')">
      <option value="">— Select —</option>
      ${q.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('')}
    </select>`;
  } else if (q.type === 'multi') {
    const vals = state.answers[q.id] || [];
    input = `<div class="checkbox-group">
      ${q.options.map(o => `
        <div class="checkbox-item ${vals.includes(o) ? 'checked' : ''}" onclick="toggleMulti('${q.id}', '${o.replace(/'/g,"\\'")}', this)">
          <div class="checkbox-box"></div>
          <div class="checkbox-label">${o}</div>
        </div>`).join('')}
    </div>`;
  } else if (q.type === 'textarea') {
    input = `<textarea class="q-textarea" id="q-${q.id}" placeholder="${q.placeholder || ''}"
      oninput="setAnswer('${q.id}', this.value)">${val || ''}</textarea>`;
  } else if (q.type === 'text') {
    input = `<input type="text" class="q-select" id="q-${q.id}" placeholder="${q.placeholder || ''}"
      value="${val || ''}" oninput="setAnswer('${q.id}', this.value)" style="background-image:none;">`;
  }

  const flagId = `flag-${q.id}`;
  const flagVisible = q.logicFlag && val && q.logicFlag.condition(val);

  return `<div class="question-block" id="qblock-${q.id}">
    <div class="question-label">Q${idx + 1}<span class="question-id">${q.id}</span></div>
    <div class="question-text">${q.text}</div>
    ${q.note ? `<div class="info-note">${q.note}</div>` : ''}
    ${input}
    ${q.logicFlag ? `<div class="logic-flag ${flagVisible ? 'visible' : ''}" id="${flagId}">⚑ ${q.logicFlag.message}</div>` : ''}
  </div>`;
}

function restoreAnswer(q) {
  const val = state.answers[q.id];
  if (!val) return;
  if (q.type === 'select' || q.type === 'text') {
    const el = document.getElementById(`q-${q.id}`);
    if (el) el.value = val;
  }
}

function setAnswer(id, value) { state.answers[id] = value; }

function toggleMulti(id, value, el) {
  if (!state.answers[id]) state.answers[id] = [];
  const arr = state.answers[id];
  const i = arr.indexOf(value);
  if (i === -1) { arr.push(value); el.classList.add('checked'); }
  else { arr.splice(i, 1); el.classList.remove('checked'); }
}

function checkLogicFlag(id) {
  const section = getSection(state.currentSection);
  if (!section) return;
  const q = section.questions.find(q => q.id === id);
  if (!q || !q.logicFlag) return;
  const val = state.answers[id];
  const flagEl = document.getElementById(`flag-${id}`);
  const shouldFire = !!(val && q.logicFlag.condition(val));
  if (flagEl) flagEl.classList.toggle('visible', shouldFire);
  state.logicFlags = state.logicFlags.filter(f => f.id !== id);
  if (shouldFire) state.logicFlags.push({ id, message: q.logicFlag.message });
}

function reEvaluateLogicFlags(section) {
  if (!section) return;
  section.questions.forEach(q => {
    if (!q.logicFlag) return;
    const val = state.answers[q.id];
    const shouldFire = !!(val && q.logicFlag.condition(val));
    state.logicFlags = state.logicFlags.filter(f => f.id !== q.id);
    if (shouldFire) state.logicFlags.push({ id: q.id, message: q.logicFlag.message });
    const flagEl = document.getElementById(`flag-${q.id}`);
    if (flagEl) flagEl.classList.toggle('visible', shouldFire);
  });
}

function goBack(idx) {
  if (idx === 0) {
    state.phase = 'preelicit';
    state.currentSection = -2;
    renderPreElicit();
  } else {
    state.currentSection = idx - 1;
    renderSection(idx - 1);
  }
}

function goSection(idx) {
  state.currentSection = idx;
  renderSection(idx);
}

// ── READY SCREEN ──────────────────────────────────────────────────────────

function goToReady() {
  state.phase = 'ready';

  // Re-evaluate ALL logic flags across all 6 sections
  state.logicFlags = [];
  for (let i = 0; i < 6; i++) {
    const section = getSection(i);
    if (!section) continue;
    section.questions.forEach(q => {
      if (!q.logicFlag) return;
      const val = state.answers[q.id];
      if (val && q.logicFlag.condition(val)) {
        if (!state.logicFlags.find(f => f.id === q.id)) {
          state.logicFlags.push({ id: q.id, message: q.logicFlag.message });
        }
      }
    });
  }

  renderSidebar();
  document.getElementById('status-phase').textContent = 'Ready to Generate';
  document.getElementById('status-mode').textContent = state.answers.q0b === 'full' ? 'Full Protocol' : 'Workflow Summary';
  document.getElementById('status-track').textContent = state.answers.q0 === 'primary' ? 'Primary Model' : 'Backup Model';

  const a = state.answers;
  const isFullProtocol = a.q0b === 'full';
  const docCount = Object.keys(state.documents).length;
  const answeredCount = Object.keys(a).filter(k => a[k] && a[k] !== '').length;
  const gapCount = state.gapFlags.length;
  const logicCount = state.logicFlags.length;

  const summaryRows = [
    { key: 'Organization', val: a.q1_orgname || '—' },
    { key: 'Use type', val: a.q2_usetype ? a.q2_usetype.split(' — ')[0] : '—' },
    { key: 'Protocol mode', val: isFullProtocol ? 'Full validation protocol' : 'Workflow validation summary' },
    { key: 'Model role', val: a.q0 === 'primary' ? 'Primary deployed model' : 'Secondary / backup model' },
    { key: 'Documents uploaded', val: `${docCount} of ${DOCUMENT_SLOTS.length}` },
    { key: 'Questions answered', val: `${answeredCount} responses captured` },
  ].map(r => `
    <div class="ready-summary-row">
      <span class="ready-summary-key">${r.key}</span>
      <span class="ready-summary-val">${r.val}</span>
    </div>`).join('');

  const gapFlagHTML = gapCount > 0 ? `
    <div class="flag-block doc-gaps">
      <div class="flag-block-label">⚑ Document gap flags (${gapCount})</div>
      ${state.gapFlags.map(f => `<div class="flag-item">↳ ${f.message}</div>`).join('')}
    </div>` : '';

  const logicFlagHTML = logicCount > 0 ? `
    <div class="flag-block logic-flags">
      <div class="flag-block-label">⚑ Protocol flags (${logicCount})</div>
      ${state.logicFlags.slice(0, 5).map(f => `<div class="flag-item">${f.message}</div>`).join('')}
      ${logicCount > 5 ? `<div class="flag-item flag-more">…and ${logicCount - 5} more — all will appear in the protocol</div>` : ''}
    </div>` : '';

  document.getElementById('content').innerHTML = `
    <div class="ready-screen">

      <div class="ready-eyebrow">Step 3 of 3 · Generate</div>
      <h2 class="ready-title">Elicitation<br><em>complete</em></h2>
      <div class="ready-mode-badge ${isFullProtocol ? 'full' : 'summary'}">
        ${isFullProtocol ? '◉ Full validation protocol' : '◎ Workflow validation summary'}
      </div>

      <div class="ready-stats">
        <div class="ready-stat">
          <div class="ready-stat-num">${answeredCount}</div>
          <div class="ready-stat-label">Responses</div>
        </div>
        <div class="ready-stat">
          <div class="ready-stat-num">${docCount}</div>
          <div class="ready-stat-label">Documents</div>
        </div>
        <div class="ready-stat ${gapCount > 0 ? 'warn' : ''}">
          <div class="ready-stat-num">${gapCount}</div>
          <div class="ready-stat-label">Gap flags</div>
        </div>
        <div class="ready-stat ${logicCount > 0 ? 'alert' : ''}">
          <div class="ready-stat-num">${logicCount}</div>
          <div class="ready-stat-label">Risk flags</div>
        </div>
      </div>

      <div class="ready-summary">
        <div class="ready-summary-label">Protocol summary</div>
        ${summaryRows}
      </div>

      ${gapFlagHTML}
      ${logicFlagHTML}

      <div class="generate-area">
        <button
          class="generate-btn"
          id="generate-btn"
          onclick="handleGeneratePDF()"
        >
          ◉ Generate validation protocol PDF
        </button>

        <div class="generate-progress" id="generate-progress">
          <div class="gen-spinner"></div>
          <span id="generate-progress-text">Preparing...</span>
        </div>

        <div class="generate-error" id="generate-error"></div>
      </div>

      <div style="margin-top: 16px; text-align: center;">
        <button class="nav-btn" onclick="goSection(5)">← Back to Section 6</button>
      </div>

      <div class="ready-footnote">
        This document has a shelf life. A validation protocol that is never updated is not a governance document — it is a record of past intentions.
      </div>

    </div>`;
}

// ── PDF GENERATION ────────────────────────────────────────────────────────

async function loadJsPDF() {
  if (window.jspdf && window.jspdf.jsPDF) return window.jspdf.jsPDF;
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    script.onload = () => {
      if (window.jspdf && window.jspdf.jsPDF) resolve(window.jspdf.jsPDF);
      else reject(new Error('jsPDF loaded but constructor not found'));
    };
    script.onerror = () => reject(new Error('Failed to load jsPDF'));
    document.head.appendChild(script);
  });
}

async function handleGeneratePDF() {
  const btn = document.getElementById('generate-btn');
  const progressEl = document.getElementById('generate-progress');
  const progressText = document.getElementById('generate-progress-text');
  const errorEl = document.getElementById('generate-error');
  if (!btn) return;

  const setProgress = (msg) => {
    if (progressText) progressText.textContent = msg;
  };

  btn.disabled = true;
  btn.classList.add('generating');
  btn.textContent = '◉ Generating...';
  progressEl.classList.add('visible');
  errorEl.classList.remove('visible');

  try {
    // Step 1 — call orchestrator
    setProgress('Calling governance engines...');
    const response = await fetch('/api/generate-protocol', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        answers: state.answers || {},
        logicFlags: (state.logicFlags || []).map(f => f.id || f),
        gapFlags: (state.gapFlags || []).map(f => f.message || f),
        documentMeta: Object.values(state.documents || {}).map(d => ({
          name: d.filename || d.name,
          type: d.id,
          size: d.size ? Math.round(d.size / 1024) + 'KB' : null,
          phiResult: d.phiResult || null,
        })),
      }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({ error: 'Server error' }));
      throw new Error(err.error || `API error ${response.status}`);
    }

    const { protocol } = await response.json();

    // Step 2 — load jsPDF
    setProgress('Loading PDF renderer...');
    const JsPDF = await loadJsPDF();

    // Step 3 — render
    setProgress('Rendering document...');
    const doc = new JsPDF({ orientation: 'portrait', unit: 'pt', format: 'letter' });
    renderProtocolPDF(doc, protocol);

    // Step 4 — save
    setProgress('Saving...');
    const orgSlug = (state.answers.q1_orgname || 'protocol')
      .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 30);
    const dateStr = new Date().toISOString().slice(0, 10);
    const filename = `validation-protocol-${orgSlug}-${dateStr}.pdf`;
    doc.save(filename);

    btn.classList.remove('generating');
    btn.classList.add('done');
    btn.disabled = false;
    btn.textContent = `✓ Downloaded: ${filename}`;
    progressEl.classList.remove('visible');

  } catch (err) {
    console.error('PDF generation error:', err);
    btn.classList.remove('generating');
    btn.disabled = false;
    btn.textContent = '◉ Generate validation protocol PDF';
    progressEl.classList.remove('visible');
    errorEl.classList.add('visible');
    errorEl.textContent = `Generation failed: ${err.message}`;
  }
}

// ── PDF RENDERER ──────────────────────────────────────────────────────────
// Inline renderer — no external module needed.

function renderProtocolPDF(doc, protocol) {
  const C = {
    pageW: 612, pageH: 792,
    mL: 54, mR: 54, mT: 54, mB: 72,
    purple: [88, 44, 130], teal: [32, 120, 110],
    charcoal: [42, 42, 42], midGray: [100, 100, 100],
    lightGray: [220, 220, 220], paleGray: [245, 245, 243],
    white: [255, 255, 255],
    red: [160, 40, 40], amber: [180, 120, 20], green: [35, 100, 65],
    redBg: [253, 232, 232], amberBg: [255, 243, 205],
    greenBg: [216, 243, 220], grayBg: [242, 242, 242],
  };
  C.contentW = C.pageW - C.mL - C.mR;

  let y = C.mT;
  let pageNum = 1;

  const addPage = () => {
    doc.addPage();
    pageNum++;
    y = C.mT;
    // Page header
    doc.setDrawColor(...C.purple);
    doc.setLineWidth(1.5);
    doc.line(C.mL, 28, C.pageW - C.mR, 28);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(...C.midGray);
    doc.text('Healthcare Governance Commons — Validation Protocol', C.mL, 22);
    doc.text(protocol.meta.deploymentName || '', C.pageW - C.mR, 22, { align: 'right' });
    y = 50;
  };

  const needsPage = (h) => { if (y + h > C.pageH - C.mB) { addPage(); return true; } return false; };

  const fillRect = (x, ry, w, h, color) => {
    doc.setFillColor(...color);
    doc.rect(x, ry, w, h, 'F');
  };

  const bodyText = (text, x, ry, maxW, color) => {
    if (!text) return ry;
    doc.setTextColor(...(color || C.charcoal));
    const lines = doc.splitTextToSize(String(text), maxW || C.contentW);
    doc.text(lines, x, ry);
    return ry + lines.length * 11;
  };

  const hRule = (ry, color) => {
    doc.setDrawColor(...(color || C.lightGray));
    doc.setLineWidth(0.5);
    doc.line(C.mL, ry, C.pageW - C.mR, ry);
  };

  // ── COVER PAGE ──
  fillRect(0, 0, C.pageW, C.pageH, C.paleGray);
  fillRect(0, 0, C.pageW, 8, C.purple);
  fillRect(0, C.pageH - 8, C.pageW, 8, C.teal);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(...C.midGray);
  doc.text('Healthcare Governance Commons', C.mL, 40);

  // Title block
  fillRect(C.mL, 160, C.contentW, 110, C.white);
  fillRect(C.mL, 160, 4, 110, C.purple);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.setTextColor(...C.charcoal);
  doc.text('Validation Protocol', C.mL + 16, 183);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(13);
  doc.setTextColor(...C.purple);
  const nameLines = doc.splitTextToSize(protocol.meta.deploymentName || 'Unnamed Deployment', C.contentW - 24);
  doc.text(nameLines, C.mL + 16, 205);

  // Mode badge
  const badgeColor = protocol.meta.isFullProtocol ? C.teal : C.amber;
  fillRect(C.mL + 16, 232, protocol.meta.isFullProtocol ? 130 : 155, 17, badgeColor);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7.5);
  doc.setTextColor(...C.white);
  doc.text(protocol.meta.protocolMode.toUpperCase(), C.mL + 22, 243);

  // Meta rows
  const metaItems = [
    ['Institution', protocol.meta.institution],
    ['Use Type', protocol.meta.useType],
    ['Generated', protocol.meta.generatedDate],
    ['Protocol Version', protocol.meta.version],
  ];
  metaItems.forEach(([label, val], i) => {
    const ry = 300 + i * 22;
    fillRect(C.mL, ry - 9, C.contentW, 20, i % 2 === 0 ? C.white : C.paleGray);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(...C.midGray);
    doc.text(label.toUpperCase(), C.mL + 8, ry + 4);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...C.charcoal);
    doc.text(String(val || '—'), C.mL + 130, ry + 4);
  });

  // Overall rating
  const ov = protocol.overallRating;
  if (ov) {
    const ratingColorMap = {
      critical: { bg: C.redBg, border: C.red, text: C.red },
      elevated: { bg: C.amberBg, border: C.amber, text: C.amber },
      moderate: { bg: C.amberBg, border: C.amber, text: C.amber },
      adequate: { bg: C.greenBg, border: C.green, text: C.green },
    };
    const rc = ratingColorMap[ov.rating] || { bg: C.grayBg, border: C.midGray, text: C.midGray };
    const rY = 300 + metaItems.length * 22 + 16;
    fillRect(C.mL, rY, C.contentW, 52, rc.bg);
    doc.setDrawColor(...rc.border);
    doc.setLineWidth(1);
    doc.rect(C.mL, rY, C.contentW, 52, 'S');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(...rc.text);
    doc.text('OVERALL GOVERNANCE RATING', C.mL + 10, rY + 14);
    doc.setFontSize(11);
    doc.text(ov.label || '—', C.mL + 10, rY + 28);
    if (ov.summary) {
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7.5);
      doc.setTextColor(...C.charcoal);
      const sumLines = doc.splitTextToSize(ov.summary, C.contentW - 20);
      if (sumLines[0]) doc.text(sumLines[0], C.mL + 10, rY + 42);
    }
  }

  // Shelf life
  hRule(C.pageH - 90, 'lightGray');
  doc.setFont('helvetica', 'italic');
  doc.setFontSize(7.5);
  doc.setTextColor(...C.midGray);
  const shelfLines = doc.splitTextToSize(protocol.meta.shelfLifeStatement, C.contentW);
  doc.text(shelfLines, C.mL, C.pageH - 78);

  // ── SECTIONS ──
  const sections = protocol.sections || [];
  for (const section of sections) {
    addPage();

    // Section header bar
    fillRect(C.mL, y, C.contentW, 28, C.purple);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.setTextColor(...C.white);
    doc.text(`${section.sectionNumber}. ${section.title}`, C.mL + 10, y + 17);
    y += 38;

    if (section.error) {
      fillRect(C.mL, y, C.contentW, 36, C.redBg);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8.5);
      doc.setTextColor(...C.red);
      doc.text('Engine Error — Section requires manual completion', C.mL + 8, y + 14);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...C.charcoal);
      const errLines = doc.splitTextToSize(section.errorNote || '', C.contentW - 16);
      doc.text(errLines, C.mL + 8, y + 26);
      y += 42;
      continue;
    }

    // Overall rating block (sections 5 & 6)
    if (section.overallRating) {
      const ov = section.overallRating;
      const ratingColorMap = {
        critical: { bg: C.redBg, border: C.red, text: C.red },
        elevated: { bg: C.amberBg, border: C.amber, text: C.amber },
        moderate: { bg: C.amberBg, border: C.amber, text: C.amber },
        adequate: { bg: C.greenBg, border: C.green, text: C.green },
        recommended: { bg: C.greenBg, border: C.green, text: C.green },
        conditional: { bg: C.amberBg, border: C.amber, text: C.amber },
        not_recommended: { bg: C.redBg, border: C.red, text: C.red },
      };
      const rc = ratingColorMap[ov.rating || ov.status] || { bg: C.grayBg, border: C.midGray, text: C.midGray };
      const sumLines = ov.summary || ov.rationale ? doc.splitTextToSize(ov.summary || ov.rationale, C.contentW - 20) : [];
      const rH = 28 + sumLines.length * 10 + 8;
      needsPage(rH + 10);
      fillRect(C.mL, y, C.contentW, rH, rc.bg);
      doc.setDrawColor(...rc.border);
      doc.setLineWidth(1);
      doc.rect(C.mL, y, C.contentW, rH, 'S');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.setTextColor(...rc.text);
      doc.text(ov.label || '—', C.mL + 10, y + 16);
      if (sumLines.length > 0) {
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        doc.setTextColor(...C.charcoal);
        doc.text(sumLines, C.mL + 10, y + 28);
      }
      y += rH + 10;
    }

    // Principle statement (bias section)
    if (section.principleStatement) {
      needsPage(28);
      fillRect(C.mL, y, 3, 22, C.teal);
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(8.5);
      doc.setTextColor(...C.teal);
      const pLines = doc.splitTextToSize(section.principleStatement, C.contentW - 12);
      doc.text(pLines, C.mL + 10, y + 10);
      y += Math.max(26, pLines.length * 11 + 8);
    }

    // Vendor non-disclosure alert
    if (section.vendorNonDisclosure) {
      needsPage(40);
      fillRect(C.mL, y, C.contentW, 36, C.redBg);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8.5);
      doc.setTextColor(...C.red);
      doc.text('Vendor Non-Disclosure', C.mL + 8, y + 13);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...C.charcoal);
      doc.text('Vendor has not disclosed training data demographic composition. Treat all unverified axes as potential mismatches.', C.mL + 8, y + 25);
      y += 42;
    }

    // Taxonomy note
    if (section.taxonomyNote) {
      needsPage(20);
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(8);
      doc.setTextColor(...C.midGray);
      const tnLines = doc.splitTextToSize(section.taxonomyNote, C.contentW);
      doc.text(tnLines, C.mL, y);
      y += tnLines.length * 10 + 8;
    }

    // Subsections
    for (const sub of (section.subsections || [])) {
      needsPage(24);
      hRule(y, 'lightGray');
      y += 3;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.setTextColor(...C.purple);
      doc.text(sub.title, C.mL, y + 10);
      y += 20;

      renderSubcontent(doc, sub, C, protocol, { y, needsPage, fillRect, hRule, bodyText, addPage });
      // Retrieve updated y from the render call
      y = renderSubcontent(doc, sub, C, protocol, { y, needsPage, fillRect, hRule, bodyText, addPage });
      y += 8;
    }

    // Section gap flags
    const sectionGaps = section.biasGapFlags || section.tierGapFlags || section.nodeGapFlags || [];
    if (sectionGaps.length > 0) {
      needsPage(24);
      hRule(y, 'lightGray');
      y += 3;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.setTextColor(...C.purple);
      doc.text('Section Gap Flags', C.mL, y + 10);
      y += 20;
      for (const flag of sectionGaps) {
        needsPage(20);
        const fLines = doc.splitTextToSize(flag, C.contentW - 18);
        const fH = fLines.length * 10 + 10;
        fillRect(C.mL, y, 3, fH, C.amber);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        doc.setTextColor(...C.charcoal);
        doc.text(fLines, C.mL + 10, y + 9);
        y += fH + 4;
      }
    }
  }

  // Gap flags appendix
  if (protocol.allGapFlags && protocol.allGapFlags.length > 0) {
    addPage();
    fillRect(C.mL, y, C.contentW, 28, C.charcoal);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.setTextColor(...C.white);
    doc.text('Appendix — Consolidated Gap Flags', C.mL + 10, y + 17);
    y += 38;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8.5);
    doc.setTextColor(...C.midGray);
    doc.text(`${protocol.allGapFlags.length} gap flags generated across this protocol. Each should be assigned to an owner and tracked to resolution.`, C.mL, y);
    y += 16;

    for (let i = 0; i < protocol.allGapFlags.length; i++) {
      const flag = protocol.allGapFlags[i];
      const fLines = doc.splitTextToSize(flag, C.contentW - 36);
      const fH = Math.max(20, fLines.length * 9 + 10);
      needsPage(fH + 2);
      fillRect(C.mL, y, C.contentW, fH, i % 2 === 0 ? C.paleGray : C.white);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      doc.setTextColor(...C.amber);
      doc.text(`${i + 1}.`, C.mL + 6, y + 13);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(...C.charcoal);
      doc.text(fLines, C.mL + 22, y + 13);
      y += fH;
    }
  }

  // Final shelf life — last page, bottom
  needsPage(40);
  y += 12;
  hRule(y, 'teal');
  y += 14;
  doc.setFont('helvetica', 'italic');
  doc.setFontSize(8.5);
  doc.setTextColor(...C.teal);
  const sfLines = doc.splitTextToSize(protocol.meta.shelfLifeStatement, C.contentW);
  doc.text(sfLines, C.mL, y);

  // Page numbers
  const total = pageNum;
  for (let i = 1; i <= total; i++) {
    doc.setPage(i);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(...C.midGray);
    doc.text(`Page ${i} of ${total}`, C.pageW / 2, C.pageH - 20, { align: 'center' });
  }
}

// Renders subsection content and returns updated y position
function renderSubcontent(doc, sub, C, protocol, ctx) {
  let { y, needsPage, fillRect, hRule, bodyText } = ctx;
  const content = sub.content;
  if (!content) return y;

  // Key-value pairs
  const kvSkip = new Set(['metrics','compatibilityTable','rules','stratifiedGroups','nodeAssessments',
    'priorityActions','warnings','conditions','items','flags','risks','triggers',
    'ownershipStatement','narrativeSummary','mismatchFlags','namedRisks','rationale',
    'metricsNote','note','noDocumentsNote','noGapsNote']);

  // Render KV for simple fields
  for (const [key, val] of Object.entries(content)) {
    if (kvSkip.has(key) || val === null || val === undefined) continue;
    if (typeof val === 'object') continue;
    needsPage(16);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(...C.midGray);
    doc.text(key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase()).toUpperCase(), C.mL, y);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(...C.charcoal);
    const vLines = doc.splitTextToSize(String(val), C.contentW - 140);
    doc.text(vLines, C.mL + 140, y);
    y += Math.max(14, vLines.length * 11);
  }

  // Narrative summary
  if (content.narrativeSummary) {
    needsPage(20);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    const nLines = doc.splitTextToSize(content.narrativeSummary, C.contentW);
    doc.setTextColor(...C.charcoal);
    doc.text(nLines, C.mL, y);
    y += nLines.length * 11 + 6;
  }

  // Named risks (qualitative mode)
  if (content.namedRisks && content.namedRisks.length > 0) {
    for (const risk of content.namedRisks) {
      needsPage(20);
      const rLines = doc.splitTextToSize(risk, C.contentW - 14);
      fillRect(C.mL, y, 3, rLines.length * 10 + 6, C.amber);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...C.charcoal);
      doc.text(rLines, C.mL + 10, y + 9);
      y += rLines.length * 10 + 10;
    }
  }

  // Mismatch flags
  if (content.mismatchFlags && content.mismatchFlags.length > 0) {
    for (const flag of content.mismatchFlags) {
      needsPage(18);
      const fLines = doc.splitTextToSize(flag, C.contentW - 14);
      fillRect(C.mL, y, 3, fLines.length * 10 + 6, C.red);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...C.charcoal);
      doc.text(fLines, C.mL + 10, y + 9);
      y += fLines.length * 10 + 8;
    }
  }

  // Compatibility table (full bias mode)
  if (content.compatibilityTable) {
    const table = content.compatibilityTable;
    if (table.summary) {
      const s = table.summary;
      needsPage(16);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8.5);
      doc.setTextColor(...C.charcoal);
      doc.text(`${s.compatible || 0} compatible · ${s.partial || 0} partial · ${s.incompatible || 0} incompatible · ${s.unknown || 0} unknown`, C.mL, y);
      y += 14;
      if (s.highRiskIncompatibleCount > 0) {
        needsPage(28);
        fillRect(C.mL, y, C.contentW, 24, C.redBg);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(8);
        doc.setTextColor(...C.red);
        doc.text(`${s.highRiskIncompatibleCount} high-risk axes incompatible or unknown: ${(s.highRiskIncompatibleAxes || []).join(', ')}`, C.mL + 8, y + 14);
        y += 30;
      }
    }
    // Table rows
    const compatColors = { compatible: C.greenBg, partial: C.amberBg, incompatible: C.redBg, unknown: C.grayBg, not_tracked: C.grayBg };
    needsPage(18);
    fillRect(C.mL, y, C.contentW, 16, C.charcoal);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(7);
    doc.setTextColor(...C.white);
    doc.text('Demographic Axis', C.mL + 3, y + 10);
    doc.text('Compatibility', C.mL + 200, y + 10);
    doc.text('Mismatch Risk', C.mL + 310, y + 10);
    doc.text('Recommended Action', C.mL + 400, y + 10);
    y += 16;
    for (let ri = 0; ri < (table.rows || []).length; ri++) {
      const row = table.rows[ri];
      const actLines = doc.splitTextToSize(row.recommendedAction || '', 100);
      const rowH = Math.max(14, actLines.length * 8 + 6);
      needsPage(rowH + 2);
      fillRect(C.mL, y, C.contentW, rowH, ri % 2 === 0 ? C.white : C.paleGray);
      fillRect(C.mL + 200, y, 105, rowH, compatColors[row.compatibility] || C.grayBg);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7.5);
      doc.setTextColor(...C.charcoal);
      doc.text(row.axis || '', C.mL + 3, y + rowH / 2 + 2);
      doc.text(row.compatibilityDisplay?.label || row.compatibility || '', C.mL + 203, y + rowH / 2 + 2);
      doc.text(row.mismatchRisk || '', C.mL + 313, y + rowH / 2 + 2);
      doc.setFontSize(7);
      doc.text(actLines, C.mL + 403, y + 9);
      y += rowH;
    }
    y += 8;
  }

  // Metrics block
  if (content.metrics) {
    const m = content.metrics;
    const metricRows = [
      ['Sensitivity', m.sensitivity ? (m.sensitivity * 100).toFixed(1) + '%' : 'Not provided'],
      ['Specificity', m.specificity ? (m.specificity * 100).toFixed(1) + '%' : 'Not provided'],
      ['Prevalence', m.prevalence ? (m.prevalence * 100).toFixed(1) + '%' : 'Not provided'],
      ['PPV', m.ppvDisplay || (m.calculable ? '—' : 'Not calculable')],
      ['NPV', m.npvDisplay || (m.calculable ? '—' : 'Not calculable')],
    ];
    for (let i = 0; i < metricRows.length; i++) {
      const [label, val] = metricRows[i];
      needsPage(16);
      fillRect(C.mL, y, C.contentW, 14, i % 2 === 0 ? C.paleGray : C.white);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      doc.setTextColor(...C.midGray);
      doc.text(label, C.mL + 6, y + 10);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(...C.charcoal);
      doc.text(String(val), C.mL + 120, y + 10);
      y += 14;
    }
    if (content.metricsNote) {
      needsPage(20);
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(7.5);
      doc.setTextColor(...C.midGray);
      const mnLines = doc.splitTextToSize(content.metricsNote, C.contentW);
      doc.text(mnLines, C.mL, y + 4);
      y += mnLines.length * 9 + 8;
    }
    y += 6;
  }

  // Tier thresholds
  if (content.thresholds) {
    const t = content.thresholds;
    const threshRows = [
      ['Warning threshold', `${t.warning}% degradation from validation baseline`],
      ['Action threshold', `${t.action}% degradation from validation baseline`],
      ['Stop threshold', `${t.stop}% degradation from validation baseline`],
      t.sensitivityFloor ? ['Sensitivity floor (hard stop)', t.sensitivityFloor] : null,
      t.specificityFloor ? ['Specificity floor', t.specificityFloor] : null,
    ].filter(Boolean);
    for (const [label, val] of threshRows) {
      needsPage(14);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      doc.setTextColor(...C.midGray);
      doc.text(label, C.mL, y);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(...C.charcoal);
      doc.text(String(val), C.mL + 170, y);
      y += 14;
    }
    y += 4;
  }

  // Westgard rules table
  if (content.rules) {
    if (content.phaseInNote) {
      needsPage(28);
      fillRect(C.mL, y, C.contentW, 24, C.amberBg);
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(7.5);
      doc.setTextColor(...C.charcoal);
      const pnLines = doc.splitTextToSize(content.phaseInNote, C.contentW - 16);
      doc.text(pnLines, C.mL + 8, y + 10);
      y += 28;
    }
    const tierBg = { warning: C.amberBg, action: C.redBg, stop: [255, 220, 220] };
    for (const rule of content.rules) {
      const respLines = doc.splitTextToSize(rule.response || '', 190);
      const rowH = Math.max(40, respLines.length * 9 + 18);
      needsPage(rowH + 4);
      fillRect(C.mL, y, C.contentW, rowH, rule.active === false ? C.grayBg : (tierBg[rule.tier] || C.paleGray));
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8.5);
      doc.setTextColor(...C.charcoal);
      doc.text(rule.westgardAnalog || '', C.mL + 6, y + 13);
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(7.5);
      doc.setTextColor(...C.midGray);
      const transLines = doc.splitTextToSize(rule.mlTranslation || '', 150);
      doc.text(transLines, C.mL + 6, y + 23);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7.5);
      doc.setTextColor(...C.charcoal);
      const threshLines = doc.splitTextToSize(rule.threshold || '', 140);
      doc.text(threshLines, C.mL + 170, y + 13);
      doc.text(respLines, C.mL + 315, y + 13);
      if (rule.active === false) {
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(7);
        doc.setTextColor(...C.midGray);
        doc.text('NOT YET ACTIVE', C.pageW - C.mR - 62, y + 10);
      }
      y += rowH + 2;
    }
    y += 6;
  }

  // Rationale bullets
  if (content.rationale && Array.isArray(content.rationale)) {
    for (const r of content.rationale) {
      if (!r) continue;
      needsPage(14);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8.5);
      doc.setTextColor(...C.charcoal);
      const rLines = doc.splitTextToSize(r, C.contentW - 14);
      doc.text('→', C.mL + 4, y);
      doc.text(rLines, C.mL + 16, y);
      y += rLines.length * 10 + 4;
    }
    y += 4;
  }

  // Stratified groups
  if (content.stratifiedGroups && content.stratifiedGroups.length > 0) {
    for (const group of content.stratifiedGroups) {
      needsPage(28);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8.5);
      doc.setTextColor(...C.teal);
      doc.text(group.axis || '', C.mL, y);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7.5);
      doc.setTextColor(...C.charcoal);
      y += 12;
      const recLines = doc.splitTextToSize(group.monitoringRecommendation || '', C.contentW - 10);
      doc.text(recLines, C.mL + 10, y);
      y += recLines.length * 9 + 6;
    }
  }

  // Ownership statement
  if (content.ownershipStatement) {
    const own = content.ownershipStatement;
    needsPage(28);
    fillRect(C.mL, y, 3, 22, C.teal);
    doc.setFont('helvetica', 'italic');
    doc.setFontSize(8.5);
    doc.setTextColor(...C.teal);
    doc.text(own.principleStatement || '', C.mL + 10, y + 10);
    y += 28;
    if (own.statement) {
      needsPage(20);
      const sLines = doc.splitTextToSize(own.statement, C.contentW);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8.5);
      doc.setTextColor(...C.charcoal);
      doc.text(sLines, C.mL, y);
      y += sLines.length * 10 + 6;
    }
    if (own.escalationPath) {
      needsPage(24);
      fillRect(C.mL, y, C.contentW, 22, C.amberBg);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...C.charcoal);
      const eLines = doc.splitTextToSize(own.escalationPath, C.contentW - 16);
      doc.text(eLines, C.mL + 8, y + 10);
      y += 26;
    }
  }

  // Node assessments
  if (content.nodeAssessments) {
    const ratingMap = {
      critical: { bg: C.redBg, border: C.red, text: C.red, badge: 'CRITICAL' },
      moderate: { bg: C.amberBg, border: C.amber, text: C.amber, badge: 'MODERATE' },
      adequate: { bg: C.greenBg, border: C.green, text: C.green, badge: 'ADEQUATE' },
      unknown: { bg: C.grayBg, border: C.midGray, text: C.midGray, badge: 'UNKNOWN' },
    };
    for (const node of content.nodeAssessments) {
      const rc = ratingMap[node.rating] || ratingMap.unknown;
      const recs = node.recommendations || [];
      const recLinesAll = recs.map(r => doc.splitTextToSize(r, C.contentW - 24));
      const totalRecH = recLinesAll.reduce((s, rl) => s + rl.length * 9 + 3, 0);
      const nodeH = 28 + totalRecH + (node.unknownIsSignal ? 12 : 0);
      needsPage(nodeH + 6);
      fillRect(C.mL, y, C.contentW, nodeH, rc.bg);
      doc.setDrawColor(...rc.border);
      doc.setLineWidth(0.5);
      doc.rect(C.mL, y, C.contentW, nodeH, 'S');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9.5);
      doc.setTextColor(...C.charcoal);
      doc.text(`${node.nodeLabel} — ${node.domain}`, C.mL + 8, y + 14);
      // Badge
      fillRect(C.pageW - C.mR - 72, y + 4, 68, 14, rc.border);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7.5);
      doc.setTextColor(...C.white);
      doc.text(rc.badge, C.pageW - C.mR - 68, y + 13);
      let recY = y + (node.unknownIsSignal ? 34 : 24);
      if (node.unknownIsSignal) {
        doc.setFont('helvetica', 'italic');
        doc.setFontSize(7);
        doc.setTextColor(...C.midGray);
        doc.text(`${node.unknownCount} unanswered signal questions — rating may understate risk`, C.mL + 8, y + 24);
      }
      for (let ri = 0; ri < recs.length; ri++) {
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        doc.setTextColor(...rc.text);
        doc.text('→', C.mL + 10, recY);
        doc.setTextColor(...C.charcoal);
        doc.text(recLinesAll[ri], C.mL + 20, recY);
        recY += recLinesAll[ri].length * 9 + 3;
      }
      y += nodeH + 6;
    }
  }

  // Priority actions
  if (content.priorityActions) {
    for (let i = 0; i < content.priorityActions.length; i++) {
      const action = content.priorityActions[i];
      needsPage(28);
      const ratingColor = action.rating === 'critical' ? C.red : C.amber;
      fillRect(C.mL, y, C.contentW, 26, i % 2 === 0 ? C.paleGray : C.white);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8.5);
      doc.setTextColor(...ratingColor);
      doc.text(`${i + 1}. ${action.node}`, C.mL + 6, y + 10);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...C.charcoal);
      const actLines = doc.splitTextToSize(action.topAction || '', C.contentW - 100);
      doc.text(actLines, C.mL + 6, y + 21);
      y += Math.max(26, actLines.length * 9 + 16);
    }
  }

  // Cross-node warnings
  if (content.warnings && content.warnings.length > 0) {
    for (const w of content.warnings) {
      needsPage(22);
      const wLines = doc.splitTextToSize(w, C.contentW - 14);
      fillRect(C.mL, y, 3, wLines.length * 10 + 8, C.amber);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8.5);
      doc.setTextColor(...C.charcoal);
      doc.text(wLines, C.mL + 10, y + 9);
      y += wLines.length * 10 + 12;
    }
  }

  // Checklist items
  if (content.items && sub.title && sub.title.includes('Checklist')) {
    const statusMap = {
      complete: { sym: '✓', color: C.green },
      incomplete: { sym: '✗', color: C.red },
      recommended: { sym: '◈', color: C.amber },
      'n/a-review-required': { sym: '?', color: C.midGray },
    };
    for (const item of content.items) {
      needsPage(14);
      const sc = statusMap[item.status] || { sym: '—', color: C.midGray };
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(...sc.color);
      doc.text(sc.sym, C.mL + 4, y);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8.5);
      doc.setTextColor(...C.charcoal);
      doc.text(item.item || String(item), C.mL + 18, y);
      y += 14;
    }
  }

  // Conditions / deployment conditions
  if (content.conditions) {
    for (const cond of content.conditions) {
      needsPage(18);
      const isReq = cond.startsWith('REQUIRED');
      const cLines = doc.splitTextToSize(cond, C.contentW - 14);
      fillRect(C.mL, y, 3, cLines.length * 10 + 6, isReq ? C.red : C.amber);
      doc.setFont('helvetica', isReq ? 'bold' : 'normal');
      doc.setFontSize(8.5);
      doc.setTextColor(...C.charcoal);
      doc.text(cLines, C.mL + 10, y + 9);
      y += cLines.length * 10 + 10;
    }
  }

  // Revalidation triggers
  if (content.triggers) {
    for (const t of content.triggers) {
      needsPage(14);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8.5);
      doc.setTextColor(...C.charcoal);
      doc.text('→', C.mL + 4, y);
      const tLines = doc.splitTextToSize(t, C.contentW - 16);
      doc.text(tLines, C.mL + 16, y);
      y += tLines.length * 10 + 4;
    }
  }

  // Generic flags
  if (content.flags && Array.isArray(content.flags)) {
    for (const flag of content.flags) {
      needsPage(18);
      const fLines = doc.splitTextToSize(flag, C.contentW - 14);
      fillRect(C.mL, y, 3, fLines.length * 10 + 8, C.amber);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...C.charcoal);
      doc.text(fLines, C.mL + 10, y + 9);
      y += fLines.length * 10 + 10;
    }
    if (content.totalGaps !== undefined) {
      needsPage(14);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8.5);
      doc.setTextColor(...C.midGray);
      doc.text(`Total gap flags: ${content.totalGaps}`, C.mL, y);
      y += 14;
    }
  }

  // Generic risks
  if (content.risks && Array.isArray(content.risks)) {
    for (const risk of content.risks) {
      const severityColor = { high: C.red, moderate: C.amber }[risk.severity] || C.midGray;
      const descLines = doc.splitTextToSize(risk.description || '', C.contentW - 16);
      const miOpts = risk.mitigationOptions || [];
      const miLines = miOpts.map(m => doc.splitTextToSize(m, C.contentW - 28));
      const miH = miLines.reduce((s, ml) => s + ml.length * 9 + 2, 0);
      const riskH = 16 + descLines.length * 10 + (miOpts.length > 0 ? miH + 14 : 0) + 10;
      needsPage(riskH + 4);
      fillRect(C.mL, y, C.contentW, riskH, C.paleGray);
      fillRect(C.mL, y, 3, riskH, severityColor);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(...severityColor);
      doc.text(`${risk.risk} [${(risk.severity || 'UNKNOWN').toUpperCase()}]`, C.mL + 10, y + 12);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...C.charcoal);
      doc.text(descLines, C.mL + 10, y + 24);
      if (miOpts.length > 0) {
        let mY = y + 24 + descLines.length * 10 + 6;
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(7.5);
        doc.setTextColor(...C.midGray);
        doc.text('MITIGATION OPTIONS:', C.mL + 10, mY);
        mY += 10;
        for (let mi = 0; mi < miLines.length; mi++) {
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7.5);
          doc.setTextColor(...C.charcoal);
          doc.text('→', C.mL + 10, mY);
          doc.text(miLines[mi], C.mL + 20, mY);
          mY += miLines[mi].length * 9 + 2;
        }
      }
      y += riskH + 6;
    }
  }

  // Open items table
  if (content.items && sub.title && sub.title.includes('Open Items')) {
    if (content.note) {
      needsPage(14);
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(8);
      doc.setTextColor(...C.midGray);
      doc.text(content.note, C.mL, y);
      y += 14;
    }
    needsPage(18);
    fillRect(C.mL, y, C.contentW, 16, C.charcoal);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(7.5);
    doc.setTextColor(...C.white);
    doc.text('#', C.mL + 3, y + 10);
    doc.text('Description', C.mL + 22, y + 10);
    doc.text('Owner', C.mL + 290, y + 10);
    doc.text('Target', C.mL + 390, y + 10);
    doc.text('Status', C.mL + 460, y + 10);
    y += 16;
    for (let i = 0; i < content.items.length; i++) {
      const item = content.items[i];
      const dLines = doc.splitTextToSize(item.description || '', 260);
      const rowH = Math.max(14, dLines.length * 9 + 6);
      needsPage(rowH + 2);
      fillRect(C.mL, y, C.contentW, rowH, i % 2 === 0 ? C.paleGray : C.white);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7.5);
      doc.setTextColor(...C.charcoal);
      doc.text(String(item.number || i + 1), C.mL + 3, y + rowH / 2 + 2);
      doc.text(dLines, C.mL + 22, y + 9);
      doc.text(item.owner || '—', C.mL + 290, y + rowH / 2 + 2);
      doc.text(item.targetDate || '—', C.mL + 390, y + rowH / 2 + 2);
      doc.setTextColor(...(item.status === 'Open' ? C.amber : C.green));
      doc.text(item.status || 'Open', C.mL + 460, y + rowH / 2 + 2);
      y += rowH;
    }
    y += 6;
  }

  return y;
}

// ── STATUS BAR ────────────────────────────────────────────────────────────

function updateStatusBar() {
  const modeEl = document.getElementById('status-mode');
  const trackEl = document.getElementById('status-track');
  if (modeEl) modeEl.textContent = state.answers.q0b === 'full' ? 'Full Protocol' : state.answers.q0b === 'summary' ? 'Workflow Summary' : '—';
  if (trackEl) trackEl.textContent = state.answers.q0 === 'primary' ? 'Primary Model' : state.answers.q0 === 'secondary' ? 'Backup Model' : '—';
}

// ── FILE UTILS ────────────────────────────────────────────────────────────

function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.onerror = () => reject(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error('Read failed'));
    r.readAsText(file);
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────
renderUpload();
</script>
